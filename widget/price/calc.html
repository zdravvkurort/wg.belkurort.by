<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <!-- import CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
</head>

<body>
  <div id="app">
    <el-form label-width="200px" v-loading.fullscreen.lock="fullscreenLoading">
      <el-input placeholder="Введите стоимость в бел руб" v-model="bel" clearable @input="handleChange">
        <template slot="append">BYN</template>
      </el-input>
      <h2>Итого сумма: {{ros}} рос руб</h2>
    </el-form>
  </div>
</body>
<!-- import Vue before Element -->
<script src="https://unpkg.com/vue/dist/vue.js"></script>
<!-- import JavaScript -->
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/element-ui/lib/umd/locale/en.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
  ELEMENT.locale(ELEMENT.lang.en)

  new Vue({
    el: "#app",
    data: {
      bel: 0,
      kurs: 0,
      ros: 0,
      fullscreenLoading: true
    },
    methods: {
      handleChange(value) {
        this.bel = this.bel.replace(/[^\d;]/g, "")
        this.ros = (this.bel / this.kurs * 100).toFixed(2).replace(/(\d)(?=(\d{3})+\.)/g, "$1 ").replace(".", ",");
      }
    },
    async mounted() {
      const courses = await axios.post("http://wg.belkurort.by/widget/price/getInnerCoursesFromDB.php", {date: '01.03.2022', hash: 'jkdshglsdfoiguosdfignmdfsjhgkshdflgjhdsflkjg'})
      console.log(courses)

      //     this.kurs = response["data"][0]
      //   ))
      //   .catch(error => this.$message({
      //     message: error,
      //     type: "error"
      //   })).finally(() => (this.fullscreenLoading = false));
    }
  })
</script>

</html>
